version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - PROVIDER_MODE=local
      - JWT_SECRET=super-secret-key-for-local-development-compose
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend/data:/usr/src/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always
