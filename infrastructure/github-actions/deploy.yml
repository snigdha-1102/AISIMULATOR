# Reference copy of .github/workflows/deploy.yml
name: Build & Deploy Future Self Simulator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test-build:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Build TypeScript Project
        run: |
          cd backend
          npm run build

  frontend-test-build:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Compile and Build Next.js
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://your-backend-render-app.com/api"
